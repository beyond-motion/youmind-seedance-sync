name: Sync And Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "site/**"
      - ".github/workflows/sync-and-deploy.yml"
      - "package.json"

concurrency:
  group: youmind-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  sync-feishu-self-hosted:
    if: ${{ vars.ENABLE_SELF_HOSTED_LARK_SYNC == '1' }}
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - youmind-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure persistent prompt cache
        run: |
          echo "YOUMIND_CACHE_DIR=$HOME/.cache/youmind-seedance-sync" >> "$GITHUB_ENV"
          echo "YOUMIND_MAX_CACHE_AGE_HOURS=2" >> "$GITHUB_ENV"
          echo "YOUMIND_ALLOW_STALE_CACHE_ON_ERROR=1" >> "$GITHUB_ENV"
          echo "YOUMIND_MAX_RETRIES=2" >> "$GITHUB_ENV"
          echo "YOUMIND_PAGE_DELAY_MS=2000" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.cache/youmind-seedance-sync"

      - name: Fetch latest prompts
        env:
          YOUMIND_MODEL: seedance-2.0
          YOUMIND_LOCALE: zh-CN
        run: npm run fetch

      - name: Sync to Feishu with local lark-cli
        env:
          YOUMIND_MODEL: seedance-2.0
          YOUMIND_LOCALE: zh-CN
          FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: npm run sync:lark:local-auth

      - name: Mirror videos to R2
        if: ${{ vars.ENABLE_R2_MIRROR == '1' }}
        continue-on-error: true
        env:
          YOUMIND_MODEL: seedance-2.0
          YOUMIND_LOCALE: zh-CN
          FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          ENABLE_R2_MIRROR: ${{ vars.ENABLE_R2_MIRROR }}
          YOUMIND_R2_BUCKET: ${{ vars.YOUMIND_R2_BUCKET }}
          YOUMIND_R2_PUBLIC_URL_BASE: ${{ vars.YOUMIND_R2_PUBLIC_URL_BASE }}
          YOUMIND_R2_LOCATION: ${{ vars.YOUMIND_R2_LOCATION }}
          YOUMIND_R2_KEY_PREFIX: ${{ vars.YOUMIND_R2_KEY_PREFIX }}
        run: npm run sync:r2

      - name: Build site data
        env:
          YOUMIND_MODEL: seedance-2.0
          YOUMIND_LOCALE: zh-CN
          FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          SITE_SOURCE_MODE: feishu-first
        run: npm run build:site

      - name: Deploy Cloudflare Pages
        run: npx wrangler pages deploy site --project-name seedance --branch main --commit-dirty=true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy To GitHub Pages
        uses: actions/deploy-pages@v4

  sync-and-deploy:
    if: ${{ vars.ENABLE_SELF_HOSTED_LARK_SYNC != '1' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch latest prompts
        env:
          YOUMIND_MODEL: seedance-2.0
          YOUMIND_LOCALE: zh-CN
        run: npm run fetch

      - name: Sync to Feishu via Open API
        env:
          YOUMIND_MODEL: seedance-2.0
          YOUMIND_LOCALE: zh-CN
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: |
          if [[ -n "${FEISHU_APP_ID}" && -n "${FEISHU_APP_SECRET}" && -n "${FEISHU_BASE_TOKEN}" && -n "${FEISHU_TABLE_ID}" ]]; then
            npm run sync:api
          else
            echo "Skipping Open API sync because required secrets are missing."
          fi

      - name: Build site data
        env:
          YOUMIND_MODEL: seedance-2.0
          YOUMIND_LOCALE: zh-CN
          SITE_SOURCE_MODE: public-only
        run: npm run build:site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy To GitHub Pages
        uses: actions/deploy-pages@v4
